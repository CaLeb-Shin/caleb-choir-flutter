name: caleb_choir
description: "C.C Note - Church Choir Note"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.8.0
  firebase_auth: ^5.3.3
  cloud_firestore: ^5.5.0
  firebase_storage: ^12.3.6

  # State & Navigation
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  go_router: ^14.2.0

  # UI & Utils
  url_launcher: ^6.2.5
  http: ^1.6.0
  cached_network_image: ^3.3.1
  intl: ^0.19.0
  shared_preferences: ^2.2.3
  mobile_scanner: ^6.0.2
  qr_flutter: ^4.1.0
  share_plus: ^10.0.0
  path_provider: ^2.1.2
  image_picker: ^1.0.7
  file_picker: ^8.0.0
  google_sign_in: ^6.2.1
  google_fonts: ^6.1.0
  firebase_messaging: ^15.1.6
  kakao_flutter_sdk_user: ^1.9.5
  cloud_functions: ^5.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
