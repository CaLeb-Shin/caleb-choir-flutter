  <script>
    // Kakao Developers 콘솔 > 플랫폼 키에 배포 도메인과 리다이렉트 URI를 등록해야 합니다.
    (function () {
      var KAKAO_JS_KEY = 'abfe7b47dcddf30af3b239b9561da8608';
      var KAKAO_REST_API_KEY = '1f9fa5991d000ee260fa27298f20ad8d';

      function toMessage(error) {
        if (!error) return '카카오 로그인 오류가 발생했습니다.';
        if (typeof error === 'string') return error;
        if (error.message) return error.message;
        try {
          return JSON.stringify(error);
        } catch (_) {
          return String(error);
        }
      }

      window.CCNoteKakao = {
        storageKey: 'cc-note-kakao-oauth-state',
        redirectStorageKey: 'cc-note-kakao-redirect-uri',
        ensureInitialized: function () {
          if (!window.Kakao) {
            throw new Error('카카오 SDK를 불러오지 못했습니다. 네트워크 또는 스크립트 차단 여부를 확인해주세요.');
          }
          if (!window.Kakao.isInitialized()) {
            window.Kakao.init(KAKAO_JS_KEY);
          }
          if (!window.Kakao.isInitialized()) {
            throw new Error('카카오 SDK 초기화에 실패했습니다. JavaScript 키와 Web 플랫폼 도메인을 확인해주세요.');
          }
        },
        start: function () {
          try {
            var redirectUri = window.location.origin;
            var state =
              'kakao_' +
              Date.now().toString(36) +
              Math.random().toString(36).slice(2) +
              Math.random().toString(36).slice(2);

            window.sessionStorage.setItem(window.CCNoteKakao.storageKey, state);
            window.sessionStorage.setItem(window.CCNoteKakao.redirectStorageKey, redirectUri);

            var params = new URLSearchParams({
              response_type: 'code',
              client_id: KAKAO_REST_API_KEY,
              redirect_uri: redirectUri,
              state: state
            });

            window.location.assign('https://kauth.kakao.com/oauth/authorize?' + params.toString());
          } catch (error) {
            throw new Error(toMessage(error));
          }
        },
        consumeCallback: function () {
          var params = new URLSearchParams(window.location.search);
          var state = params.get('state');
          var expectedState = window.sessionStorage.getItem(window.CCNoteKakao.storageKey);
          if (!state || !expectedState || state !== expectedState) return null;

          var redirectUri =
            window.sessionStorage.getItem(window.CCNoteKakao.redirectStorageKey) ||
            window.location.origin;

          window.sessionStorage.removeItem(window.CCNoteKakao.storageKey);
          window.sessionStorage.removeItem(window.CCNoteKakao.redirectStorageKey);

          var cleanUrl = window.location.origin + window.location.pathname;
          window.history.replaceState({}, document.title, cleanUrl);

          if (params.get('error')) {
            return JSON.stringify({ error: params.get('error_description') || params.get('error') });
          }
          var code = params.get('code');
          if (!code) return JSON.stringify({ error: '카카오 인증 코드를 받지 못했습니다.' });
          return JSON.stringify({ code: code, state: state, redirectUri: redirectUri });
        },
        logout: function (callback) {
          try {
            window.CCNoteKakao.ensureInitialized();
            var result = window.Kakao.Auth.logout();
            if (result && typeof result.then === 'function') {
              result.finally(callback);
            } else {
              callback();
            }
          } catch (_) {
            callback();
          }
        }
      };

      try {
        window.CCNoteKakao.ensureInitialized();
      } catch (error) {
        console.warn('[C.C Note] Kakao initialization failed:', toMessage(error));
      }
    })();
  </script>

  <!-- Naver OAuth — Client Secret은 Firebase Functions 환경변수에만 둡니다. -->
  <script>
    window.CCNoteNaver = {
      clientId: '3NXDVvi7IxgIYBxA3IXL',
      storageKey: 'cc-note-naver-oauth-state',
      redirectStorageKey: 'cc-note-naver-redirect-uri',
      start: function () {
        var clientId = window.CCNoteNaver.clientId;
        if (!clientId || clientId === 'YOUR_NAVER_CLIENT_ID') {
          throw new Error('NAVER_CLIENT_ID_NOT_CONFIGURED');
        }

        var redirectUri = window.location.origin + window.location.pathname;
        var state =
          Date.now().toString(36) +
          Math.random().toString(36).slice(2) +
          Math.random().toString(36).slice(2);

        window.sessionStorage.setItem(window.CCNoteNaver.storageKey, state);
        window.sessionStorage.setItem(window.CCNoteNaver.redirectStorageKey, redirectUri);

        var authorizeUrl =
          'https://nid.naver.com/oauth2.0/authorize' +
          '?response_type=code' +
          '&client_id=' + encodeURIComponent(clientId) +
          '&redirect_uri=' + encodeURIComponent(redirectUri) +
          '&state=' + encodeURIComponent(state);

        window.location.assign(authorizeUrl);
      },
      consumeCallback: function () {
        var params = new URLSearchParams(window.location.search);
        if (params.get('error')) {
          return JSON.stringify({ error: params.get('error_description') || params.get('error') });
        }
        var code = params.get('code');
        var state = params.get('state');
        if (!code || !state) return null;

        var expectedState = window.sessionStorage.getItem(window.CCNoteNaver.storageKey);
        var redirectUri =
          window.sessionStorage.getItem(window.CCNoteNaver.redirectStorageKey) ||
          window.location.origin + window.location.pathname;

        window.sessionStorage.removeItem(window.CCNoteNaver.storageKey);
        window.sessionStorage.removeItem(window.CCNoteNaver.redirectStorageKey);

        if (!expectedState || expectedState !== state) {
          return JSON.stringify({ error: 'NAVER_STATE_MISMATCH' });
        }

        var cleanUrl = window.location.origin + window.location.pathname;
        window.history.replaceState({}, document.title, cleanUrl);
        return JSON.stringify({ code: code, state: state, redirectUri: redirectUri });
      }
    };
  </script>

  <!-- Harmony relay MR playback bridge — keeps iPhone Safari audio unlocked from the user's tap. -->
  <script>
    window.CCNoteRelayAudio = (function () {
      var audio = null;
      var currentUrl = '';

      function shouldUseBridge() {
        return true;
      }

      function ensureAudio() {
        if (audio) return audio;
        audio = new Audio();
        audio.preload = 'auto';
        audio.playsInline = true;
        audio.setAttribute('playsinline', 'true');
        audio.setAttribute('webkit-playsinline', 'true');
        audio.style.display = 'none';
        if (document.body) document.body.appendChild(audio);
        return audio;
      }

      function load(url) {
        var player = ensureAudio();
        if (currentUrl !== url) {
          currentUrl = url;
          player.src = url;
          try { player.load(); } catch (_) {}
        }
        return player;
      }

      function seek(player, seconds) {
        var next = Math.max(0, Number(seconds) || 0);
        try { player.currentTime = next; } catch (_) {}
      }

      function play(player) {
        try {
          var promise = player.play();
          if (promise && typeof promise.catch === 'function') {
            promise.catch(function (error) {
              console.warn('[C.C Note] Relay MR playback blocked:', error && error.message ? error.message : error);
            });
          }
          return true;
        } catch (error) {
          console.warn('[C.C Note] Relay MR playback failed:', error && error.message ? error.message : error);
          return false;
        }
      }

      return {
        prime: function (url, startSeconds) {
          if (!shouldUseBridge()) return false;
          if (!url) return false;
          var player = load(url);
          player.loop = true;
          player.muted = false;
          player.defaultMuted = false;
          player.volume = 0;
          try { player.removeAttribute('muted'); } catch (_) {}
          seek(player, startSeconds);
          return play(player);
        },
        start: function (url, startSeconds) {
          if (!shouldUseBridge()) return false;
          if (!url) return false;
          var player = load(url);
          try { player.pause(); } catch (_) {}
          player.loop = false;
          player.muted = false;
          player.defaultMuted = false;
          player.volume = 1;
          try { player.removeAttribute('muted'); } catch (_) {}
          seek(player, startSeconds);
          return play(player);
        },
        stop: function () {
          if (!audio) return;
          try { audio.pause(); } catch (_) {}
          try { audio.currentTime = 0; } catch (_) {}
          audio.loop = false;
          audio.muted = false;
          audio.defaultMuted = false;
          audio.volume = 1;
          try { audio.removeAttribute('muted'); } catch (_) {}
        },
        // Master-clock accessors: the relay studio drives lyric highlighting and
        // layered clip playback off the MR element's real currentTime so audio,
        // voices, and lyrics stay locked together instead of drifting on a timer.
        currentTime: function () {
          if (!audio) return -1;
          var t = audio.currentTime;
          return (typeof t === 'number' && isFinite(t)) ? t : -1;
        },
        isPlaying: function () {
          return !!(audio && !audio.paused && !audio.ended);
        }
      };
    })();
  </script>

  <!-- Microphone permission probe — lets the app silently check whether the mic
       is already granted (via the Permissions API) so it never re-asks once the
       user has allowed it for this site. -->
  <script>
    window.CCNoteMic = (function () {
      return {
        // Resolves to 'granted' | 'prompt' | 'denied' | 'unknown' without ever
        // opening the mic, so checking permission can't trigger a prompt.
        state: function () {
          try {
            if (navigator.permissions && navigator.permissions.query) {
              return navigator.permissions.query({ name: 'microphone' })
                .then(function (status) { return status.state || 'unknown'; })
                .catch(function () { return 'unknown'; });
            }
          } catch (_) {}
          return Promise.resolve('unknown');
        }
      };
    })();
  </script>

        container.appendChild(loading);

        panel.appendChild(container);

        shell.appendChild(close);
        layer.appendChild(shell);
        document.body.appendChild(layer);

        new window.daum.Postcode({
          oncomplete: function (data) {
            var roadAddress = data.roadAddress || '';
            var jibunAddress = data.jibunAddress || data.autoJibunAddress || '';
            var address = roadAddress || jibunAddress;
            var extra = '';

            if (roadAddress) {
              if (data.bname && /[동|로|가]$/g.test(data.bname)) {
                extra += data.bname;
              }
              if (data.buildingName && data.apartment === 'Y') {
                extra += extra ? ', ' + data.buildingName : data.buildingName;
              }
              if (extra) address += ' (' + extra + ')';
            }

            removeLayer(layer);
            finish(address);
          },
          width: '100%',
          height: '100%',
          maxSuggestItems: 5
        }).embed(container);

      function removeBootstrapLoader() {
        var loader = document.getElementById('cc-note-bootstrap-loader');
        if (!loader) return;
        loader.classList.add('cc-note-loader-hidden');
        window.setTimeout(function () {
          if (loader.parentNode) loader.parentNode.removeChild(loader);
